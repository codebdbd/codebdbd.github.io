  :root{
    scroll-behavior: smooth;
    --bg:#0000AA;
    --panel:#0009C7;
    --cyan:#55FFFF;
    --yellow:#FFFF55;
    --ink:#EAEAF7;
    --muted:#9494E0;
    --ok:#66FF66;
    --err:#FF7A7A;
    --font-display:'VT323','Courier New',monospace;
    --font-body:'JetBrains Mono','Consolas','Courier New',monospace;
  }

  *{ box-sizing:border-box; }

  html,body{ margin:0; padding:0; }

  body{
    background:
      radial-gradient(ellipse 120% 90% at 50% 0%, var(--panel) 0%, var(--bg) 62%);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }

  .scanlines{
    position:fixed; inset:0; pointer-events:none; z-index:50;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.14) 0px,
        rgba(0,0,0,0.14) 1px,
        transparent 1px,
        transparent 3px
      );
    mix-blend-mode:multiply;
    opacity:.4;
    animation: crt-flicker 0.15s infinite;
  }

  @keyframes crt-flicker {
    0% { opacity: 0.4; }
    50% { opacity: 0.39; }
    100% { opacity: 0.4; }
  }

  /* CRT vignette and curvature effect (subtle) */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 49;
    background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.15) 90%, rgba(0,0,0,0.2) 100%);
  }

  a{ color:inherit; }

  button{ font:inherit; }

  :focus-visible{
    outline:2px solid var(--yellow);
    outline-offset:2px;
  }

  /* ---------- Layout shell ---------- */
  .wrap{ max-width:1100px; margin:0 auto; padding:0 18px 60px; }

  .titlebar{
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;
    background:var(--panel);
    border-bottom:3px double var(--cyan);
    padding:12px 18px 12px 18px;
  }
  .titlebar .app-name{
    font-weight:700; letter-spacing:.05em; color:var(--yellow); font-size:.82rem; text-transform:uppercase;
  }
  .titlebar .prompt{ color:var(--cyan); font-size:.82rem; }
  .cursor{
    display:inline-block; width:.5em; background:var(--yellow); margin-left:2px;
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{ 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  @media (prefers-reduced-motion: reduce){
    .cursor, .scanlines{ animation:none; }
  }

  .lang-switch{ display:flex; gap:6px; }
  .lang-btn{
    background:transparent; border:1px solid var(--cyan); color:var(--cyan);
    padding:4px 11px; font-size:.75rem; letter-spacing:.06em; cursor:pointer;
  }
  .lang-btn:hover{ background:rgba(85,255,255,.15); }
  .lang-btn[aria-pressed="true"]{
    background:var(--yellow); border-color:var(--yellow); color:var(--bg); font-weight:700;
  }

  /* ---------- Hero ---------- */
  .hero{ text-align:center; padding:24px 10px 10px; }
  @keyframes wordmarkGlow {
    0%, 100% {
      text-shadow: 0 0 12px rgba(255,255,85,.35), 0 0 24px rgba(255,255,85,.25);
    }
    50% {
      text-shadow: 0 0 18px rgba(255,255,85,.55), 0 0 36px rgba(255,255,85,.35);
    }
  }
  .hero .wordmark{
    font-family:var(--font-display);
    font-size:clamp(52px,12vw,120px);
    color:var(--yellow);
    text-shadow:0 0 16px rgba(255,255,85,.45);
    line-height:.95;
    letter-spacing:.02em;
    animation: wordmarkGlow 3s ease-in-out infinite;
    position:relative;
  }

  /* Glitch layers */
  .glitch-wrap{ position:relative; display:inline-block; }
  .glitch-wrap::before,
  .glitch-wrap::after{
    content:attr(data-text);
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    font-family:var(--font-display);
    font-size:clamp(52px,12vw,120px);
    line-height:.95; letter-spacing:.02em;
    overflow:hidden; pointer-events:none;
    opacity:0;
  }
  .glitch-wrap::before{ color:#ff0040; }
  .glitch-wrap::after{ color:#00ffff; }

  .glitch-active::before{
    opacity:.8;
    animation: glitch-shift 0.15s steps(2) 1;
  }
  .glitch-active::after{
    opacity:.8;
    animation: glitch-shift 0.15s steps(2) 1 reverse;
  }
  .glitch-active{
    animation: glitch-shake 0.15s steps(3) 1;
  }

  @keyframes glitch-shift{
    0%{ clip-path:inset(20% 0 40% 0); transform:translateX(-4px); }
    50%{ clip-path:inset(60% 0 10% 0); transform:translateX(4px); }
    100%{ clip-path:inset(10% 0 70% 0); transform:translateX(-2px); }
  }
  @keyframes glitch-shake{
    0%{ transform:translateX(0); }
    33%{ transform:translateX(-3px) skewX(-1deg); }
    66%{ transform:translateX(3px) skewX(1deg); }
    100%{ transform:translateX(0); }
  }
  .hero h1{
    font-size:clamp(16px,2.6vw,22px);
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink);
    margin:14px 0 0;
    font-weight:700;
  }
  .hero .tagline{
    color:var(--muted);
    max-width:800px;
    margin:14px auto 0;
    font-size:.92rem;
  }


  /* ---------- Panes ---------- */
  /* Unified grid styles for all section grids */
  .section-grid {
    display: grid;
    gap: 22px;
    margin-top: 20px;
  }

  /* Specific grid column layouts */
  .panes-grid,
  .tools-grid {
    grid-template-columns: 1fr 1fr;
  }

  .donate-preview-grid {
    grid-template-columns: 1fr 1.5fr;
  }

  @media (max-width:720px){ 
    .section-grid { 
      grid-template-columns: 1fr; 
    } 
  }

  /* Make preview fit in the grid cell */
  .donate-preview-grid .preview{
    margin-top:0;
  }

  .pane{
    border:4px double var(--cyan);
    background:rgba(0,0,0,0.08);
  }
  .pane-title{
    background:var(--panel); color:var(--yellow);
    padding:7px 14px; font-weight:700; font-size:.78rem;
    letter-spacing:.05em; text-transform:uppercase;
    border-bottom:2px solid var(--cyan);
  }
  .pane-header-row, .pane-row{
    display:grid; grid-template-columns:1fr 64px 118px; gap:8px; align-items:center;
  }
  .pane-header-row{
    padding:7px 14px; color:var(--muted); font-size:.68rem;
    letter-spacing:.08em; text-transform:uppercase;
    border-bottom:1px solid rgba(85,255,255,.25);
  }
  .pane-row{
    width:100%; padding:8px 14px; background:transparent; border:0; border-bottom:1px solid rgba(85,255,255,.08);
    color:var(--cyan); font-family:var(--font-body); font-size:.83rem; text-align:left;
  }
  .pane-row:last-child{ border-bottom:0; }
  button.pane-row{ cursor:pointer; }
  button.pane-row:hover{ background:rgba(85,255,255,.12); }
  button.pane-row.selected{
    background:var(--yellow); color:var(--bg); font-weight:700;
  }
  .pane-row .col-ext, .pane-row .col-tag{ opacity:.85; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pane-row.selected .col-ext, .pane-row.selected .col-tag{ opacity:1; }
  .tools-empty-note{ padding:10px 14px; color:var(--muted); font-size:.78rem; }

  /* ---------- Preview panel ---------- */
  .preview{
    border:4px double var(--cyan); background:rgba(0,0,0,0.08);
  }
  .preview-body{ padding:18px; }
  .preview-title{ color:var(--yellow); font-weight:700; font-size:.9rem; margin:0; text-transform:uppercase; letter-spacing:.03em;}
  .preview-desc-inline{ color:var(--muted); font-size:.82rem; font-weight:400; text-transform:none; letter-spacing:0; }
  .preview-note{ color:var(--muted); font-size:.78rem; margin:0; }
  .preview-warn{
    background:rgba(255,255,85,.12); border:1px solid var(--yellow); border-radius:4px;
    padding:8px 12px; margin:0; font-size:.78rem; color:var(--yellow);
  }
  .addr-row{
    display:flex; flex-wrap:wrap; align-items:center; gap:10px;
    background:rgba(0,0,0,.25); border:1px dashed var(--cyan); padding:10px 12px; margin:0;
  }
  .addr-value{ color:var(--cyan); font-size:.86rem; word-break:break-all; }

  .preview-flex{ display:flex; gap:22px; flex-wrap:wrap; align-items:flex-start; }
  .preview-main{ flex:1 1 260px; min-width:180px; display:flex; flex-direction:column; gap:10px; }
  .qr-stack{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; }
  .qr-box{
    flex:0 0 auto; width:140px; background:#fff; border:2px double var(--cyan);
    display:flex; align-items:center; justify-content:center;
    cursor: pointer; transition: transform 0.2s ease;
  }
  .qr-box:hover { transform: scale(1.05); }
  .qr-box img{ width:140px; height:140px; display:block; border-radius:4px; }
  .qr-caption{ color:var(--muted); font-size:.65rem; text-align:center; line-height:1.3; margin-bottom:4px; }
  .qr-hint{ color:var(--muted); font-size:.6rem; text-align:center; line-height:1.3; margin-top:2px; }

  .btn{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--yellow); color:var(--bg); border:0;
    padding:9px 16px; font-weight:700; font-size:.82rem; letter-spacing:.03em;
    cursor:pointer; text-decoration:none;
  }
  .btn:hover{ filter:brightness(1.08); }
  .btn:active{ filter:brightness(.95); }
  .btn .chevron{ font-weight:400; }

  /* Pixel particles */
  .particle{
    position:fixed; pointer-events:none; z-index:9000;
    width:4px; height:4px; background:var(--yellow);
  }

  .feedback{
    display:inline-block; margin-left:10px; font-size:.78rem; min-height:1.2em;
  }
  .feedback.ok{ color:var(--ok); }
  .feedback.err{ color:var(--err); }

  /* ---------- README ---------- */
  .readme{ margin-top:10px; border:4px double var(--cyan); background:rgba(0,0,0,.08); }
  .readme-body{ padding:18px; color:var(--ink); font-size:.88rem; border-left:3px solid rgba(85,255,255,.35); margin:16px; }

  /* ---------- Hotbar ---------- */
  .hotbar{
    margin-top:26px; display:grid; grid-template-columns:repeat(4,1fr);
    gap:2px; background:var(--panel); border:2px solid var(--cyan);
  }
  @media (max-width:600px){ .hotbar{ grid-template-columns:repeat(2,1fr); } }
  .hotkey{
    display:flex; align-items:center; gap:8px; background:transparent; border:0;
    color:var(--cyan); padding:10px 12px; cursor:pointer; font-size:.78rem; text-align:left;
  }
  .hotkey:hover{ background:rgba(85,255,255,.12); }
  .hotkey .key{
    background:var(--bg); color:var(--yellow); font-weight:700;
    padding:2px 7px; border:1px solid var(--cyan); font-size:.72rem; flex-shrink:0;
  }

  /* ---------- Footer ---------- */
  footer{
    margin-top:26px; padding-top:14px; border-top:1px solid rgba(85,255,255,.3);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
    color:var(--muted); font-size:.75rem;
  }

  /* QR Code Modal */
  .qr-modal {
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background-color: rgba(0,0,0,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qr-modal-content {
    position: relative;
    background-color: var(--bg);
    box-sizing: border-box;
    padding: 16px;
    border: 4px double var(--cyan);
    width: 90vw;
    max-width: 500px;
    max-height: 85vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .qr-modal-close {
    position: absolute;
    top: 8px;
    right: 12px;
    color: var(--cyan);
    font-size: 32px;
    font-weight: bold;
    cursor: pointer;
    line-height: 1;
  }

  .qr-modal-close:hover {
    color: var(--yellow);
  }

  .qr-modal-img {
    display: block;
    box-sizing: border-box;
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: 65vh;
    object-fit: contain;
    background: #fff;
    padding: 8px;
  }

  @media (max-width:480px){
    .qr-modal-content{
      width:92vw;
      max-width:none;
      padding:10px;
      max-height:90vh;
    }
    .qr-modal-img{ max-width:100%; max-height:70vh; }
  }

  @media (max-width:768px){
    .qr-modal-img{ max-width:100%; max-height:65vh; }
  }

</style>

<div class="scanlines" aria-hidden="true"></div>

  <!-- First row: Donate + Preview -->
  <section class="donate-preview-grid section-grid">

      <div class="pane-title" id="donate-pane-title">C:\DONATE\ — Выбрать способ поддержки</div>

<script>
(function(){

  function burstParticles(target){
    var rect = target.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var count = 14;
    for(var i = 0; i < count; i++){
      var p = document.createElement("div");
      p.className = "particle";
      p.style.left = cx + "px";
      p.style.top = cy + "px";
      var angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
      var dist = 40 + Math.random() * 60;
      var dx = Math.cos(angle) * dist;
      var dy = Math.sin(angle) * dist - 30;
      document.body.appendChild(p);
      (function(el, dx, dy){
        var start = performance.now();
        function tick(now){
          var t = (now - start) / 500;
          if(t >= 1){ el.remove(); return; }
          el.style.transform = "translate(" + (dx * t) + "px," + (dy * t + 80 * t * t) + "px)";
          el.style.opacity = 1 - t;
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      })(p, dx, dy);
    }
  }

      btn.textContent = item.btn + " ";
      var chevron = document.createElement("span");
      chevron.className = "chevron";
      chevron.textContent = "\u25B8";
      btn.appendChild(chevron);
      feedbackEl = document.createElement("span");
      feedbackEl.className = "feedback";
      feedbackEl.id = "preview-feedback";
      feedbackEl.setAttribute("aria-live", "polite");
    }

    var previewFlex = document.createElement("div");
    previewFlex.className = "preview-flex";
    var previewMain = document.createElement("div");
    previewMain.className = "preview-main";
    previewMain.appendChild(titleEl);
    if(addrRow) previewMain.appendChild(addrRow);
    if(warnEl) previewMain.appendChild(warnEl);
    var btnWrap = document.createElement("div");
    btnWrap.appendChild(btn);
    btnWrap.appendChild(feedbackEl);
    previewMain.appendChild(btnWrap);
    previewFlex.appendChild(previewMain);
    if(selectedId !== "share") previewFlex.appendChild(qrContainer);

    body.innerHTML = "";
    body.appendChild(previewFlex);

    var actionBtn = el("action-btn");
    if(actionBtn){
      actionBtn.addEventListener("click", function(e){
        e.preventDefault();
        burstParticles(actionBtn);
        primaryAction();
      });
    }

    // Add click handler to QR box
    var qrBox = body.querySelector(".qr-box");
    if(qrBox){
      var qrImg = qrBox.querySelector("img");
      qrBox.addEventListener("click", function(){
        var modal = el("qr-modal");
        var modalImg = el("qr-modal-img");
        modalImg.src = qrImg.src;
        modal._openModal();
      });
    }
  }

  function updateHotbar(){
    var data = d();
    el("hk-help").textContent = data.hotbar.help;
    el("hk-lang").textContent = data.hotbar.lang;
    el("hk-top").textContent = data.hotbar.top;
    el("hk-primary").textContent = data.hotbarPrimary[selectedId];
  }

  function updateLangButtons(){
    document.querySelectorAll(".lang-btn").forEach(function(btn){
      btn.setAttribute("aria-pressed", btn.getAttribute("data-lang") === currentLang ? "true" : "false");
    });
  }

  function renderStatic(){
    var data = d();
    document.documentElement.lang = currentLang === "uk" ? "uk" : currentLang;
    document.title = data.docTitle;

    el("col-name").textContent = data.cols.name;
    el("col-ext").textContent = data.cols.ext;
    el("col-type").textContent = data.cols.type;
    el("col-name-2").textContent = data.cols.name;
    el("col-ext-2").textContent = data.cols.ext;
    el("col-type-2").textContent = data.cols.type;
    el("col-name-3").textContent = data.cols.name;
    el("col-ext-3").textContent = data.cols.ext;
    el("col-type-3").textContent = data.cols.type;

    el("tools-c-pane-title").textContent = data.toolsCPaneTitle;
    el("tools-d-pane-title").textContent = data.toolsDPaneTitle;
    el("donate-pane-title").textContent = data.donatePaneTitle;

    el("hero-title").textContent = data.heroTitle;

    el("readme-text").textContent = data.readme;

    el("footer-thanks").textContent = data.footerThanks;
    var footerCopy = el("footer-copy");
    footerCopy.textContent = "\u00A9 2026 ";
    var footerLink = document.createElement("a");
    footerLink.href = "https://suvorov.pp.ua/";
    footerLink.style.cssText = "color: inherit; text-decoration: none;";
    footerLink.textContent = "Codebdbd";
    footerCopy.appendChild(footerLink);
  }

  function renderAll(){
    renderStatic();
    renderTools();
    renderDonateList();
    renderPreview();
    updateHotbar();
    updateLangButtons();
  }

  function setLang(lang){
    if(!translations[lang]) return;
    currentLang = lang;
    renderAll();
  }

  function bindHotbar(){
    document.querySelectorAll(".hotkey").forEach(function(btn){
      btn.addEventListener("click", function(){
        handleHotkey(btn.getAttribute("data-hotkey"));
      });
    });
  }

  function handleHotkey(action){
    if(action === "help") cycleDonate();
    else if(action === "primary") primaryAction();
    else if(action === "lang") cycleLang();
    else if(action === "top") scrollToTop();
  }

  function bindLangSwitch(){
    document.querySelectorAll(".lang-btn").forEach(function(btn){
      btn.addEventListener("click", function(){
        setLang(btn.getAttribute("data-lang"));
      });
    });
  }

  function bindKeyboard(){
    window.addEventListener("keydown", function(e){
      var map = { F1: "help", F8: "primary", F9: "lang", F10: "top" };
      if(map[e.key]){
        e.preventDefault();
        handleHotkey(map[e.key]);
      }
    });
  }

  function bindModal(){
    var modal = el("qr-modal");
    var closeBtn = el("qr-modal-close");
    var lastFocused = null;

    function openModal(){
      lastFocused = document.activeElement;
      modal.style.display = "block";
      closeBtn.focus();
    }

    function closeModal(){
      modal.style.display = "none";
      if(lastFocused) lastFocused.focus();
    }

    // Close when clicking X
    closeBtn.addEventListener("click", closeModal);

    // Close when clicking outside the modal
    modal.addEventListener("click", function(e){
      if(e.target === modal) closeModal();
    });

    // Close with Escape key and trap Tab inside modal
    document.addEventListener("keydown", function(e){
      if(modal.style.display !== "block") return;
      if(e.key === "Escape"){
        closeModal();
        return;
      }
      if(e.key === "Tab"){
        var focusable = modal.querySelectorAll("a, button, input, [tabindex]");
        var first = focusable[0];
        var last = focusable[focusable.length - 1];
        if(e.shiftKey && document.activeElement === first){
          e.preventDefault();
          last.focus();
        } else if(!e.shiftKey && document.activeElement === last){
          e.preventDefault();
          first.focus();
        }
      }
    });

    // Store reference for external callers
    modal._openModal = openModal;
  }

  document.addEventListener("DOMContentLoaded", function(){
    renderAll();
    bindLangSwitch();
    bindHotbar();
    bindKeyboard();
    bindModal();
    initGlitch();
  });

  function initGlitch(){
    var wrap = document.querySelector(".glitch-wrap");
    if(!wrap) return;
    function trigger(){
      wrap.classList.add("glitch-active");
      setTimeout(function(){ wrap.classList.remove("glitch-active"); }, 160);
      setTimeout(trigger, 4000 + Math.random() * 6000);
    }
    setTimeout(trigger, 2000 + Math.random() * 3000);
  }
})();
</script>
